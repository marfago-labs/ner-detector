# Gitleaks config for ner-detector (CI + pre-commit).
# https://github.com/gitleaks/gitleaks

title = "ner-detector"

[extend]
useDefault = true

[allowlist]
description = "Placeholders, examples, and test fixtures (not real secrets)"
paths = [
  '''(?:^|/)\.env\.example$''',
  '''(?:^|/)docs/''',
  '''(?:^|/)tests/''',
  '''(?:^|/)scripts/''',
  '''(?:^|/)benchmark/config/''',
]
regexes = [
  '''sk-or-\.\.\.''',
  '''OPENROUTER_API_KEY=''',
]

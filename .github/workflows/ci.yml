# Fast checks on every push/PR — no ML model download.
name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/checkout@v5
        with:
          repository: marfago-labs/ner-dataset
          path: ner-dataset

      - uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Tests (coverage ≥95%)
        env:
          NER_DATASET_DIR: ${{ github.workspace }}/ner-dataset/datasets
        run: uv run pytest tests/ -q --cov=ner_detector --cov-fail-under=95

# Fast checks on every push/PR — no ML model download.
name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

# Node 20 on Actions runners is deprecated; opt into Node 24 for JS actions (checkout, cache, etc.).
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Tests (coverage ≥95%)
        run: uv run pytest tests/ -q --cov=ner_detector --cov-fail-under=95

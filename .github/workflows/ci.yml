# Lint, typecheck, secret scan, and tests (coverage ≥95%) on every push/PR.
name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true
          save-cache: false

      - name: Install dev dependencies
        run: uv sync --extra dev

      - name: Ruff (lint)
        run: uv run ruff check ner_detector tests

      - name: Ruff (format)
        run: uv run ruff format --check ner_detector tests

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true
          save-cache: false

      - name: Install dev dependencies
        run: uv sync --extra dev

      - name: Mypy
        run: uv run mypy ner_detector

  secrets:
    name: Secret scan (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Install Gitleaks
        env:
          GITLEAKS_VERSION: "8.24.2"
        run: |
          curl -sSL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" -o gitleaks.tar.gz
          tar -xzf gitleaks.tar.gz gitleaks
          sudo install -m 755 gitleaks /usr/local/bin/gitleaks

      - name: Gitleaks detect
        run: gitleaks detect --source . --config .gitleaks.toml --verbose

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/checkout@v5
        with:
          repository: marfago-labs/ner-dataset
          path: ner-dataset

      - uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Tests (coverage ≥95%)
        env:
          NER_DATASET_DIR: ${{ github.workspace }}/ner-dataset/datasets
        run: uv run pytest tests/ -q --cov=ner_detector --cov-fail-under=95

# Run gold benchmark and publish report.html to GitHub Pages.
# Configure via Settings → Secrets and variables → Actions (see docs/ci.md).
name: Benchmark report (Pages)

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: benchmark-pages-${{ github.ref }}
  cancel-in-progress: false

jobs:
  benchmark:
    runs-on: ubuntu-latest
    outputs:
      output_dir: ${{ steps.paths.outputs.output_dir }}
    env:
      TRANSFORMERS_VERBOSITY: ${{ vars.TRANSFORMERS_VERBOSITY || 'error' }}
      HF_HOME: ${{ github.workspace }}/.cache/huggingface
      HF_TOKEN: ${{ secrets.HF_TOKEN }}
      OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
      NER_DATASET_DIR: ${{ github.workspace }}/ner-dataset/datasets
    steps:
      - uses: actions/checkout@v5

      - uses: actions/checkout@v5
        with:
          repository: marfago-labs/ner-dataset
          path: ner-dataset

      - uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true

      - name: Cache Hugging Face models
        uses: actions/cache@v5
        with:
          path: ${{ github.workspace }}/.cache/huggingface
          key: hf-${{ runner.os }}-${{ hashFiles('uv.lock', 'benchmark/config/compare_backends.yaml') }}
          restore-keys: |
            hf-${{ runner.os }}-

      - name: Install dependencies (ML + LLM backends)
        run: uv sync --extra dev --extra ml --extra gliner --extra llm

      - name: Lint and typecheck
        run: |
          uv run ruff check ner_detector tests
          uv run ruff format --check ner_detector tests
          uv run mypy ner_detector

      - id: paths
        shell: bash
        run: |
          out="${{ vars.BENCHMARK_OUTPUT_DIR }}"
          if [ -z "$out" ]; then
            out="benchmark/results/latest"
          fi
          echo "output_dir=$out" >> "$GITHUB_OUTPUT"

      - name: Run benchmark
        shell: bash
        run: |
          set -euo pipefail
          out="${{ steps.paths.outputs.output_dir }}"
          mkdir -p "$(dirname "$out")"

          repeats="${{ vars.BENCHMARK_REPEATS }}"
          if [ -z "$repeats" ]; then repeats="1"; fi

          args=(--repeats "$repeats" --output "$out")

          max_ex="${{ vars.BENCHMARK_MAX_EXAMPLES }}"
          if [ -n "$max_ex" ]; then
            args+=(--max-examples "$max_ex")
          fi

          pattern_only="${{ vars.BENCHMARK_PATTERN_ONLY }}"
          if [ "$pattern_only" = "true" ] || [ "$pattern_only" = "1" ]; then
            args+=(--pattern-only)
          fi

          datasets="${{ vars.BENCHMARK_DATASETS }}"
          if [ -n "$datasets" ]; then
            args+=(--datasets "$datasets")
          fi

          runs="${{ vars.BENCHMARK_RUNS }}"
          if [ -n "$runs" ]; then
            args+=(--runs "$runs")
          fi

          echo "Running: uv run python benchmark/run_benchmark.py ${args[*]}"
          uv run python benchmark/run_benchmark.py "${args[@]}"

      - name: Prepare Pages site (index.html)
        shell: bash
        run: |
          out="${{ steps.paths.outputs.output_dir }}"
          test -f "$out/report.html"
          cp "$out/report.html" "$out/index.html"

      - name: Reject Windows absolute paths in report
        shell: bash
        run: |
          out="${{ steps.paths.outputs.output_dir }}"
          if grep -E '[A-Za-z]:\\' "$out/report.md" "$out/report.html" 2>/dev/null; then
            echo "report contains drive-letter paths (machine-local leak)" >&2
            exit 1
          fi

      - name: Upload report (workflow artifact)
        uses: actions/upload-artifact@v6
        with:
          name: ner-benchmark-report
          path: ${{ steps.paths.outputs.output_dir }}
          retention-days: 90

      - name: Upload Pages artifact
        if: vars.BENCHMARK_DEPLOY_PAGES != 'false'
        uses: actions/upload-pages-artifact@v4
        with:
          path: ${{ steps.paths.outputs.output_dir }}

  deploy:
    needs: benchmark
    if: vars.BENCHMARK_DEPLOY_PAGES != 'false'
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5

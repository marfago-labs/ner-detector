# Benchmark all gold files from sibling ner-dataset repo.
repeats: 1

runs:
  - name: pattern
    backend: pattern

  - name: bert-conll
    backend: transformers
    model_id: dslim/bert-base-NER
    threshold: 0.5
    datasets:
      - synthetic_news_100
      - synthetic_blog_100
      - synthetic_transcript_100
      - synthetic_scientific_100
      - synthetic_mixed_100

  - name: gliner-medium
    backend: gliner
    model_id: urchade/gliner_medium-v2.1
    # Must cover both synthetic gold (person/org/loc/date/number) and arxiv_gold
    # (model/dataset/benchmark/metric/method). general_en labels yield ~0 on arxiv.
    labels:
      - person
      - organization
      - location
      - date
      - number
      - product
      - model
      - dataset
      - benchmark
      - metric
      - method
    threshold: 0.5

  - name: gliner-bi-large
    backend: gliner
    model_id: knowledgator/gliner-bi-large-v2.0
    # Must cover both synthetic gold (person/org/loc/date/number) and arxiv_gold
    # (model/dataset/benchmark/metric/method). general_en labels yield ~0 on arxiv.
    # Bi-encoder scores are calibrated lower than uni-encoder GLiNER; 0.5 suppresses recall.
    labels:
      - person
      - organization
      - location
      - date
      - number
      - product
      - model
      - dataset
      - benchmark
      - metric
      - method
    threshold: 0.3

  - name: llm-mock
    backend: llm
    provider: mock
    model_id: mock/ner
    labels:
      - person
      - organization
      - location
      - date
      - number
      - product
      - model
      - dataset
      - benchmark
      - metric
      - method
    temperature: 0

  - name: llm-gpt-oss
    backend: llm
    provider: openrouter
    model_id: openai/gpt-oss-120b:free
    labels:
      - person
      - organization
      - location
      - date
      - number
      - product
      - model
      - dataset
      - benchmark
      - metric
      - method
    temperature: 0
    max_chars: 8000

datasets:
  - arxiv_gold
  - synthetic_news_100
  - synthetic_blog_100
  - synthetic_transcript_100
  - synthetic_scientific_100
  - synthetic_mixed_100

label_map: unified

# Quick backend comparison on two ner-dataset gold files (full suite: compare_generated.yaml).
repeats: 1  # use --repeats N for latency variance (clears model cache between rounds)

runs:
  - name: pattern
    backend: pattern

  - name: bert-conll
    backend: transformers
    model_id: dslim/bert-base-NER
    threshold: 0.5
    # CoNLL PER/ORG/LOC only — not scored on arxiv_gold scientific labels.
    datasets:
      - synthetic_news_100

  - name: gliner-medium
    backend: gliner
    model_id: urchade/gliner_medium-v2.1
    labels:
      - person
      - organization
      - location
      - date
      - number
      - product
      - model
      - dataset
      - benchmark
      - metric
      - method
    threshold: 0.5

  - name: gliner-bi-large
    backend: gliner
    model_id: knowledgator/gliner-bi-large-v2.0
    labels:
      - person
      - organization
      - location
      - date
      - number
      - product
      - model
      - dataset
      - benchmark
      - metric
      - method
    threshold: 0.5

datasets:
  - arxiv_gold
  - synthetic_news_100

label_map: unified
